<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dotfiles Documentation</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --bg-surface: #252536;
      --bg-overlay: #2a2a3c;
      --text: #cdd6f4;
      --text-muted: #a6adc8;
      --text-dim: #6c7086;
      --accent: #89b4fa;
      --accent-hover: #b4d0fb;
      --green: #a6e3a1;
      --red: #f38ba8;
      --yellow: #f9e2af;
      --peach: #fab387;
      --mauve: #cba6f7;
      --border: #313244;
      --sidebar-w: 260px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 100;
      transition: transform 0.3s;
    }

    .sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 18px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .sidebar nav {
      padding: 12px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      color: var(--text);
      background: var(--bg-overlay);
    }

    .nav-item.active {
      color: var(--accent);
      background: var(--bg-overlay);
      border-left-color: var(--accent);
      font-weight: 600;
    }

    .nav-icon {
      width: 18px;
      text-align: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    /* Main content */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-width: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 50;
    }

    .menu-btn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .breadcrumb {
      font-size: 13px;
      color: var(--text-dim);
    }

    .breadcrumb span { color: var(--text-muted); }

    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px;
    }

    /* Markdown rendering */
    .content h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      letter-spacing: -0.5px;
    }

    .content h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      margin-top: 36px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .content h3 {
      font-size: 17px;
      font-weight: 600;
      color: var(--peach);
      margin-top: 24px;
      margin-bottom: 8px;
    }

    .content p {
      margin-bottom: 12px;
      color: var(--text-muted);
    }

    .content strong { color: var(--text); }

    .content a {
      color: var(--accent);
      text-decoration: none;
    }

    .content a:hover {
      text-decoration: underline;
      color: var(--accent-hover);
    }

    .content ul, .content ol {
      margin: 0 0 16px 24px;
      color: var(--text-muted);
    }

    .content li { margin-bottom: 4px; }

    .content code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      background: var(--bg-overlay);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--mauve);
    }

    .content pre {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0 20px;
      overflow-x: auto;
    }

    .content pre code {
      background: none;
      padding: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 20px;
      font-size: 14px;
    }

    .content th {
      background: var(--bg-surface);
      color: var(--text);
      font-weight: 600;
      text-align: left;
      padding: 10px 14px;
      border: 1px solid var(--border);
    }

    .content td {
      padding: 8px 14px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .content td code {
      font-size: 12.5px;
      white-space: nowrap;
    }

    .content tr:hover td {
      background: var(--bg-overlay);
    }

    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    .content blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 12px 0;
      background: var(--bg-surface);
      border-radius: 0 6px 6px 0;
      color: var(--text-muted);
    }

    /* Mobile */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 90;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .overlay.open {
        display: block;
      }

      .main {
        margin-left: 0;
      }

      .menu-btn {
        display: block;
      }

      .content {
        padding: 20px;
      }

      .content h1 { font-size: 26px; }
      .content h2 { font-size: 19px; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>~/dotfiles</h1>
      <p>macOS Dev Environment</p>
    </div>
    <nav id="nav"></nav>
  </aside>

  <div class="overlay" id="overlay"></div>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">&#9776;</button>
      <div class="breadcrumb">
        dotfiles / <span id="breadcrumb">overview</span>
      </div>
    </div>
    <div class="content" id="content">
      <div class="loading">Loading...</div>
    </div>
  </main>

  <!-- Markdown parser (marked.js via CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <script>
    const pages = [
      { id: 'overview',     label: 'Overview',       icon: '~' },
      { id: 'shell',        label: 'Shell',          icon: '$' },
      { id: 'aliases',      label: 'Aliases',        icon: '&rarr;' },
      { id: 'tmux',         label: 'Tmux',           icon: '#' },
      { id: 'git',          label: 'Git',            icon: '&loz;' },
      { id: 'vim',          label: 'Vim',            icon: 'v' },
      { id: 'scripts',      label: 'Scripts',        icon: '>' },
      { id: 'install',      label: 'Installation',   icon: '+' },
      { id: 'improvements', label: 'Improvements',   icon: '!' },
    ];

    const nav = document.getElementById('nav');
    const content = document.getElementById('content');
    const breadcrumb = document.getElementById('breadcrumb');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuBtn = document.getElementById('menuBtn');

    // Build navigation
    pages.forEach(p => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.dataset.page = p.id;
      a.innerHTML = `<span class="nav-icon">${p.icon}</span>${p.label}`;
      a.addEventListener('click', () => loadPage(p.id));
      nav.appendChild(a);
    });

    // Mobile menu
    menuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    });

    // Markdown config
    marked.setOptions({
      gfm: true,
      breaks: false,
    });

    // Page cache
    const cache = {};

    async function loadPage(id) {
      // Update nav
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.page === id);
      });

      breadcrumb.textContent = id;

      // Close mobile sidebar
      sidebar.classList.remove('open');
      overlay.classList.remove('open');

      // Update URL
      history.pushState({ page: id }, '', `#${id}`);

      // Load content
      if (cache[id]) {
        content.innerHTML = cache[id];
        window.scrollTo(0, 0);
        return;
      }

      content.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(`content/${id}.md`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        const html = marked.parse(md);
        cache[id] = html;
        content.innerHTML = html;
      } catch (e) {
        content.innerHTML = `<h1>Page Not Found</h1><p>Could not load <code>${id}.md</code></p>`;
      }

      window.scrollTo(0, 0);
    }

    // Handle browser back/forward
    window.addEventListener('popstate', (e) => {
      const page = e.state?.page || getPageFromHash();
      loadPage(page);
    });

    function getPageFromHash() {
      const hash = window.location.hash.slice(1);
      return pages.some(p => p.id === hash) ? hash : 'overview';
    }

    // Initial load
    loadPage(getPageFromHash());
  </script>
</body>
</html>
